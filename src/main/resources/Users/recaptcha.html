<!DOCTYPE html>
<html>
<head>
    <title>reCAPTCHA Enterprise Verification</title>
    <script src="https://www.google.com/recaptcha/enterprise.js" async defer></script>
    <script type="text/javascript">
        // This function is called automatically when the user solves the reCAPTCHA
        function onRecaptchaSuccess(token) {
            window.location.href = "recaptcha-verify:" + token;
        }
        
        function onRecaptchaExpired() {
            window.location.href = "recaptcha-expired:true";
        }

        // Keep this for compatibility with your Controller's injection logic
        function initRecaptcha(key) {
            var container = document.getElementById('recaptcha-container');
            container.setAttribute('data-sitekey', key);
            // Since the script might have already loaded, we sometimes need to tell it to check the page again
            if (typeof grecaptcha !== 'undefined' && typeof grecaptcha.enterprise !== 'undefined') {
                grecaptcha.enterprise.render('recaptcha-container');
            }
        }
    </script>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background-color: transparent; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden; 
            height: 100vh; 
        }
    </style>
</head>
<body>
    <form action="" method="POST">
        <!-- The sitekey is injected dynamically by the Controller -->
        <div id="recaptcha-container" 
             class="g-recaptcha" 
             data-sitekey="" 
             data-action="LOGIN"
             data-callback="onRecaptchaSuccess"
             data-expired-callback="onRecaptchaExpired"></div>
    </form>
</body>
</html>
